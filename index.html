<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FitPlan · 专属健身饮食计划</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card-hover: #1e1e36;
  --accent: #ff6b6b;
  --accent2: #4ecdc4;
  --accent3: #a29bfe;
  --text: #e8e8f0;
  --text2: #b0b0c0;
  --text3: #707088;
  --border: #2a2a40;
  --danger: #ff4757;
  --success: #2ed573;
  --warning: #ffa502;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  max-width: 480px; margin: 0 auto; padding: 0 0 80px; line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}
header {
  padding: 16px 16px 0; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 8px;
}
header h1 { font-size: 20px; font-weight: 800; }
header h1 span { color: var(--accent); }
.btn-icon {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--card); color: var(--text2); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { background: var(--card-hover); }
.tabs { display: flex; gap: 4px; margin: 4px 16px 12px; background: var(--card); border-radius: var(--radius); padding: 3px; }
.tab { flex:1; padding: 10px 0; text-align: center; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text3); border: none; background: transparent; transition: all 0.2s; }
.tab.active { background: var(--accent); color: #fff; }
.page { display: none; padding: 0 16px; }
.page.active { display: block; }

.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-header h3 { font-size: 15px; font-weight: 700; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
.badge-red { background: rgba(255,107,107,0.15); color: var(--accent); }
.badge-green { background: rgba(78,205,196,0.15); color: var(--accent2); }
.badge-purple { background: rgba(162,155,254,0.15); color: var(--accent3); }
.badge-orange { background: rgba(255,165,2,0.15); color: var(--warning); }

.btn { padding: 10px 18px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:active { opacity: 0.8; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-xs { padding: 4px 8px; font-size: 11px; border-radius: 6px; }
.btn-danger { background: var(--danger); color: #fff; }

.stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-box { flex:1; background: var(--card); border-radius: var(--radius); padding: 12px; text-align: center; box-shadow: var(--shadow); }
.stat-box .value { font-size: 22px; font-weight: 800; }
.stat-box .label { font-size: 11px; color: var(--text3); margin-top: 2px; }

.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.progress-red { background: var(--accent); }
.progress-green { background: var(--accent2); }

.exercise-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 6px; transition: all 0.2s; }
.exercise-item.done { opacity: 0.5; }
.exercise-item .ex-info { flex: 1; min-width:0; }
.exercise-item .ex-name { font-size: 14px; font-weight: 600; }
.exercise-item .ex-detail { font-size: 12px; color: var(--text3); margin-top: 2px; }
.ex-check { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-left: 8px; color: transparent; transition: all 0.2s; }
.ex-check.checked { background: var(--accent2); border-color: var(--accent2); color: #fff; font-size: 14px; }
.ex-input { width: 50px; padding: 7px 6px; background: #2e2e46; border: 1px solid #3a3a55; border-radius: 6px; color: #fff; font-size: 13px; text-align: center; margin-left: 6px; }
.ex-edit-group { display: flex; gap: 3px; margin-left: 6px; }
.ex-edit-group input { width: 38px; background: #2e2e46; border: 1px solid #3a3a55; border-radius: 6px; color: #fff; font-size: 13px; text-align: center; padding: 7px 4px; }

.food-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 6px; }
.food-item .food-name { font-size: 14px; font-weight: 500; }
.food-item .food-cal { font-size: 13px; color: var(--accent2); font-weight: 600; }
.food-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.food-chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; background: var(--border); color: var(--text2); border: none; transition: all 0.15s; user-select: none; }
.food-chip:active, .food-chip.selected { background: var(--accent2); color: var(--bg); }

.macro-row { display: flex; gap: 8px; margin-top: 8px; }
.macro-item { flex: 1; }
.macro-item .macro-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; display: flex; justify-content: space-between; }
.macro-item .macro-val { font-size: 11px; color: var(--text2); }

.chart-container { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.chart-container h3 { font-size: 14px; margin-bottom: 12px; }
.chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 120px; justify-content: center; }
.chart-bar { flex:1; max-width: 16px; border-radius: 3px 3px 0 0; transition: height 0.3s; cursor: pointer; }
.chart-labels { display: flex; gap: 3px; justify-content: center; margin-top: 6px; }
.chart-label { flex:1; max-width: 16px; font-size: 8px; color: var(--text3); text-align: center; }

.modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
.modal h3 { font-size: 16px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 10px 12px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
.form-row { display: flex; gap: 8px; }
.form-row .form-group { flex: 1; }

.strength-log { font-size: 13px; }
.strength-log .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.log-name { font-weight: 500; flex: 2; font-size: 13px; }
.log-current { color: var(--accent2); flex: 2; text-align: center; font-size: 13px; }
.log-prev { color: var(--text3); flex: 2; text-align: right; font-size: 12px; }

.empty { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

.period-selector { display: inline-flex; background: var(--border); border-radius: 8px; padding: 2px; }
.period-btn { padding: 6px 14px; border-radius: 7px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text3); transition: all 0.2s; }
.period-btn.active { background: var(--accent); color: #fff; }
.weight-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.weight-row input { flex:1; padding: 8px 12px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; }
.weight-row input:focus { outline: none; border-color: var(--accent); }

/* Smart suggestion */
.suggestion-card {
  background: linear-gradient(135deg, rgba(162,155,254,0.1), rgba(255,107,107,0.1));
  border: 1px solid var(--accent3); border-radius: var(--radius); padding: 14px;
  margin-bottom: 12px;
}
.suggestion-card .sug-title { font-size: 13px; font-weight: 700; color: var(--accent3); margin-bottom: 8px; }
.suggestion-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item .sug-icon { font-size: 16px; flex-shrink: 0; }

/* Template builder */
.template-builder { margin-top: 12px; }
.exercise-library { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.ex-lib-chip { padding: 4px 10px; border-radius: 14px; font-size: 12px; cursor: pointer; background: var(--border); color: var(--text2); border: none; transition: all 0.15s; }
.ex-lib-chip:active, .ex-lib-chip.selected { background: var(--accent); color: #fff; }
.selected-exercises { margin-bottom: 10px; }
.selected-ex {
  display: flex; align-items: center; gap: 6px; padding: 8px; background: rgba(255,255,255,0.03);
  border-radius: 8px; margin-bottom: 4px; font-size: 12px;
.selected-ex { display: flex; align-items: center; gap: 6px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 4px; font-size: 13px; }
.selected-ex .se-name { flex: 2; font-weight: 600; min-width: 60px; }
.selected-ex input { width: 40px; padding: 3px 4px; background: var(--border); border: none; border-radius: 4px; color: var(--text); font-size: 12px; text-align: center; }
.hint-text { font-size: 12px; color: var(--text3); margin-top: 4px; }
.form-group label { font-size: 13px; }
.suggestion-card .sug-title { font-size: 14px; }
.chart-container h3 { font-size: 15px; }
.chart-label { font-size: 9px; }

/* Food search */
.food-search-dropdown { background: var(--border); border-radius: 8px; max-height: 180px; overflow-y: auto; margin-top: 4px; }
.food-search-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; cursor: pointer; font-size: 13px; transition: background 0.15s;
}
.food-search-item:hover, .food-search-item:active { background: rgba(255,255,255,0.06); }
.food-search-item .fs-name { flex:1; }
.food-search-item .fs-macros { font-size: 11px; color: var(--text3); margin-left: 8px; }
</style>
</head>
<body>

<header>
  <h1>Fit<span>Plan</span></h1>
  <button class="btn-icon" onclick="openSettings()" title="设置">⚙</button>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('training')">🏋️ 训练</button>
  <button class="tab" onclick="switchTab('diet')">🍽 饮食</button>
  <button class="tab" onclick="switchTab('progress')">📊 进度</button>
</div>

<!-- ===== TRAINING PAGE ===== -->
<div class="page active" id="page-training">
  <div class="stats-row">
    <div class="stat-box"><div class="value" id="stat-streak">0</div><div class="label">连续打卡</div></div>
    <div class="stat-box"><div class="value" id="stat-today-ex">0</div><div class="label">今日动作</div></div>
    <div class="stat-box"><div class="value" id="stat-today-cal">0</div><div class="label">预估消耗</div></div>
  </div>

  <!-- Smart Suggestions -->
  <div class="suggestion-card" id="suggestion-panel" style="display:none;"></div>

  <div class="card">
    <div class="card-header">
      <h3>今日训练</h3>
      <span class="badge badge-red" id="period-badge">增肌期</span>
    </div>
    <div class="period-selector" style="margin-bottom:12px;">
      <button class="period-btn active" onclick="switchPeriod('bulk')">增肌期</button>
      <button class="period-btn" onclick="switchPeriod('cut')">减脂期</button>
    </div>
    <div id="exercise-list"></div>
    <div style="display:flex; gap:6px; margin-top:8px;">
      <select id="template-select" style="flex:1; padding:8px; background:var(--border); border:none; border-radius:8px; color:var(--text); font-size:12px;" onchange="loadTemplate()">
        <option value="">选择训练模板...</option>
      </select>
      <button class="btn btn-sm btn-outline" onclick="openTemplateManager()">⚙ 管理</button>
    </div>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <button class="btn btn-secondary btn-sm" onclick="resetToday()" style="flex:1;">重置今日</button>
      <button class="btn btn-primary btn-sm" onclick="finishWorkout()" style="flex:1;">✅ 完成训练</button>
    </div>
  </div>
</div>

<!-- ===== DIET PAGE ===== -->
<div class="page" id="page-diet">
  <div class="card" style="margin-bottom:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <span style="font-size:13px; font-weight:600;">🍽 今日饮食</span>
      <span style="font-size:13px;" id="diet-summary">0 / 0 kcal</span>
    </div>
    <div class="progress-bar" style="margin-bottom:10px;"><div class="progress-fill progress-green" id="diet-progress" style="width:0%"></div></div>
    <div class="macro-row">
      <div class="macro-item">
        <div class="macro-label"><span>🥩 蛋白质</span><span class="macro-val" id="macro-protein">0/0g</span></div>
        <div class="progress-bar"><div class="progress-fill progress-red" id="bar-protein" style="width:0%"></div></div>
      </div>
      <div class="macro-item">
        <div class="macro-label"><span>🍚 碳水</span><span class="macro-val" id="macro-carbs">0/0g</span></div>
        <div class="progress-bar"><div class="progress-fill" style="background:#ffa502;" id="bar-carbs" style="width:0%"></div></div>
      </div>
      <div class="macro-item">
        <div class="macro-label"><span>🥑 脂肪</span><span class="macro-val" id="macro-fat">0/0g</span></div>
        <div class="progress-bar"><div class="progress-fill progress-green" id="bar-fat" style="width:0%"></div></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h3>🏫 食堂菜品</h3></div>
    <div class="food-chips" id="cafeteria-chips"></div>
    <div style="font-size:11px; color:var(--text3); margin-top:6px;">点击菜品添加到今日饮食</div>
  </div>
  <div class="card">
    <div class="card-header"><h3>✏️ 自由添加</h3></div>
    <div class="form-row">
      <div class="form-group"><label>食物名称</label><input id="food-name" placeholder="输入名称自动搜索..." oninput="searchFood()" autocomplete="off"></div>
      <div class="form-group"><label>热量 (kcal)</label><input id="food-cal" type="number" placeholder="自动填充"></div>
    </div>
    <div id="food-search-results" style="margin-bottom:8px;"></div>
    <div class="form-row">
      <div class="form-group"><label>蛋白质 (g)</label><input id="food-protein" type="number" placeholder="自动填充"></div>
      <div class="form-group"><label>碳水 (g)</label><input id="food-carbs" type="number" placeholder="自动填充"></div>
      <div class="form-group"><label>脂肪 (g)</label><input id="food-fat" type="number" placeholder="自动填充"></div>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="addCustomFood()">+ 添加</button>
  </div>
  <div class="card">
    <div class="card-header"><h3>📋 今日记录</h3><button class="btn btn-sm btn-outline" onclick="clearTodayDiet()">清空</button></div>
    <div id="today-foods"><div class="empty"><p>还没记录饮食</p></div></div>
  </div>
</div>

<!-- ===== PROGRESS PAGE ===== -->
<div class="page" id="page-progress">
  <div class="chart-container">
    <h3>⚖️ 体重趋势 (30天)</h3>
    <div class="chart-bars" id="weight-chart"></div>
    <div class="chart-labels" id="weight-labels"></div>
    <div style="margin-top:10px; display:flex; gap:8px;">
      <div style="display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text3);"><span style="width:10px;height:10px;background:var(--accent);border-radius:2px;"></span> 增肌期</div>
      <div style="display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text3);"><span style="width:10px;height:10px;background:var(--accent2);border-radius:2px;"></span> 减脂期</div>
    </div>
    <div class="weight-row">
      <input id="new-weight" type="number" step="0.1" placeholder="输入今日体重 (kg)">
      <button class="btn btn-primary btn-sm" onclick="recordWeight()">记录</button>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <h3>💪 力量追踪</h3>
      <select id="strength-ex-select" style="padding:6px 10px; background:var(--border); border:none; border-radius:8px; color:var(--text); font-size:12px;" onchange="showStrengthLog()">
        <option value="">选择动作...</option>
      </select>
    </div>
    <div class="strength-log" id="strength-log"><div class="empty"><p>选择一个动作查看力量变化</p></div></div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="value" id="stat-total-workouts">0</div><div class="label">总训练次数</div></div>
    <div class="stat-box"><div class="value" id="stat-best-streak">0</div><div class="label">最长连续</div></div>
    <div class="stat-box"><div class="value" id="stat-weight-change">0</div><div class="label">30天变化(kg)</div></div>
  </div>
</div>

<!-- ===== SETTINGS MODAL ===== -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>⚙ 个人数据</h3>
    <div class="form-row">
      <div class="form-group"><label>身高 (cm)</label><input id="set-height" type="number" value="180"></div>
      <div class="form-group"><label>体重 (kg)</label><input id="set-weight" type="number" value="70"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>体脂率 (%)</label><input id="set-bodyfat" type="number" value="18"></div>
      <div class="form-group"><label>年龄</label><input id="set-age" type="number" value="22"></div>
    </div>
    <div class="form-group"><label>当前阶段</label><select id="set-period"><option value="bulk">增肌期</option><option value="cut">减脂期</option></select></div>
    <div class="form-group"><label>训练频率</label><select id="set-frequency"><option value="3">每周3天</option><option value="4">每周4天</option><option value="5">每周5天</option><option value="6">每周6天</option></select></div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-secondary" style="flex:1;" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- ===== TEMPLATE MANAGER MODAL ===== -->
<div class="modal-overlay" id="template-modal">
  <div class="modal">
    <h3>⚙ 训练模板管理</h3>
    <div id="template-list" style="max-height:200px;overflow-y:auto;margin-bottom:12px;"></div>
    <button class="btn btn-primary btn-block" onclick="showTemplateBuilder()">+ 新建模板</button>
    <button class="btn btn-secondary btn-block" style="margin-top:6px;" onclick="closeTemplateManager()">关闭</button>
    <div id="template-builder-area" style="display:none;"></div>
  </div>
</div>

<script>
// ============ DATA STORE ============
function loadData() {
  const d = localStorage.getItem('fitplan_data');
  if (d) return JSON.parse(d);
  return {
    height: 180, weight: 70, bodyfat: 18, age: 22,
    period: 'bulk', frequency: 4,
    weightLog: {}, dietLog: {}, trainingLog: {},
    streak: 0, lastWorkoutDate: null,
    totalWorkouts: 0, bestStreak: 0
  };
}
function saveData(data) { localStorage.setItem('fitplan_data', JSON.stringify(data)); }
let DATA = loadData();
const TD = () => new Date().toISOString().slice(0,10);
const today = TD();

// ============ CALCULATIONS ============
function calcBMR() { return Math.round(10*DATA.weight + 6.25*DATA.height - 5*DATA.age + 5); }
function calcTDEE() { return Math.round(calcBMR() * 1.55); }
function calcTarget() { const t = calcTDEE(); return DATA.period === 'bulk' ? t + 300 : t - 300; }
function calcMacros() {
  const target = calcTarget();
  const protein = Math.round(DATA.weight * 2.0);
  const fat = Math.round(target * 0.25 / 9);
  const carbs = Math.round((target - protein*4 - fat*9) / 4);
  return { target, protein, carbs, fat };
}

// ============ EXERCISE LIBRARY ============
const EXERCISE_LIBRARY = {

function getAllTemplates() {
  const list = [];
  for (const [name, exs] of Object.entries(PRESET_TEMPLATES)) {
    list.push({ name, exercises: exs.map(e => {

  }
  for (const t of getUserTemplates()) {

  }
  return list;
}

// ============ SMART SUGGESTIONS ============
function generateSuggestions() {
  const suggestions = [];
  const logs = Object.entries(DATA.trainingLog).sort((a,b) => b[0].localeCompare(a[0]));
  if (logs.length < 2) return suggestions;

  // Track per-exercise progress
  const exHistory = {};
  for (const [date, exercises] of logs) {
    for (const ex of exercises) {
      if (!exHistory[ex.name]) exHistory[ex.name] = [];
      exHistory[ex.name].push({ date, weight: ex.weight, sets: ex.sets, reps: ex.reps, done: ex.done });
    }
  }

  // 1. Weight increase suggestions
  for (const [name, history] of Object.entries(exHistory)) {
    if (history.length < 2) continue;
    const last = history[0];
    const prev = history[1];
    if (!last.done || last.weight <= 0) continue;
    // All sets done, weight same or higher, and last was also done
    if (last.weight <= prev.weight && prev.done) {
      const lib = EXERCISE_LIBRARY[name];
      if (lib && lib.defaultWeight) {
        const increment = lib.defaultWeight < 15 ? 1 : 2.5;
        suggestions.push({
          type: 'increase',
          icon: '📈',
          text: `<strong>${name}</strong>：上次 ${last.weight}kg 全部完成 → 试试 <strong>${last.weight + increment}kg</strong>？`,
          action: name, newWeight: last.weight + increment
        });
      }
    }
  }

  // 2. Muscle group balance check
  const partLastDate = {};
  for (const [name, lib] of Object.entries(EXERCISE_LIBRARY)) {
    const history = exHistory[name] || [];
    if (history.length > 0 && history[0].done) {
      const p = lib.part;
      if (!partLastDate[p] || history[0].date > partLastDate[p]) {
        partLastDate[p] = history[0].date;
      }
    }
  }
  const daysSince = (dateStr) => {
    const d = new Date(dateStr);
    const t = new Date();
    return Math.floor((t - d) / (1000*60*60*24));
  };
  const allParts = ['胸','背','腿','肩','手臂','核心'];
  for (const part of allParts) {
    const last = partLastDate[part];
    if (!last) {
      suggestions.push({ type:'balance', icon:'⚠️', text: `<strong>${part}部</strong>还没有训练记录，记得安排一下！` });
    } else if (daysSince(last) > 5) {
      suggestions.push({ type:'balance', icon:'⏰', text: `<strong>${part}部</strong>已经 ${daysSince(last)} 天没练了，下次优先安排！` });
    }
  }

  // 3. Plateau detection
  for (const [name, history] of Object.entries(exHistory)) {
    if (history.length < 3) continue;
    const recent = history.slice(0,3);
    if (recent.every(h => h.done && h.weight > 0)) {
      const weights = recent.map(h => h.weight);
      if (weights[0] === weights[1] && weights[1] === weights[2]) {
        suggestions.push({
          type: 'plateau', icon: '🔄',
          text: `<strong>${name}</strong>：连续 3 次训练重量没变，试试换个变式动作刺激？`
        });
      }
    }
  }

  // 4. Weight trend suggestion
  const weightEntries = Object.entries(DATA.weightLog).sort((a,b) => a[0].localeCompare(b[0]));
  if (weightEntries.length >= 7) {
    const recent = weightEntries.slice(-7);
    const trend = recent[recent.length-1][1].w - recent[0][1].w;
    if (DATA.period === 'bulk' && trend > 1.5) {
      suggestions.push({ type:'trend', icon:'📊', text: '体重 7 天涨了 ' + trend.toFixed(1) + 'kg，增肌期进展不错！保持热量盈余，多做大重量复合动作。' });
    } else if (DATA.period === 'bulk' && trend < -0.5) {
      suggestions.push({ type:'trend', icon:'⚠️', text: '增肌期体重反而在降？检查一下热量摄入是否足够。' });
    } else if (DATA.period === 'cut' && trend < -0.3 && trend > -1.5) {
      suggestions.push({ type:'trend', icon:'✅', text: '减脂期体重稳步下降（7天 -'+Math.abs(trend).toFixed(1)+'kg），节奏很好！' });
    }
  }

  return suggestions.slice(0, 5);
}

function renderSuggestions() {
  const panel = document.getElementById('suggestion-panel');
  const suggestions = generateSuggestions();
  if (suggestions.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="sug-title">🧠 智能建议</div>
    ${suggestions.map(s => `
      <div class="suggestion-item">
        <span class="sug-icon">${s.icon}</span>
        <div>
          <span>${s.text}</span>
          ${s.action ? `<button class="btn btn-xs btn-primary" style="margin-top:4px;" onclick="applySuggestion('${s.action}', ${s.newWeight})">采纳建议</button>` : ''}
        </div>
      </div>
    `).join('')}
  `;
}
function applySuggestion(exName, newWeight) {
  const td = today;
  if (!DATA.trainingLog[td]) return;
  for (const ex of DATA.trainingLog[td]) {
    if (ex.name === exName) {
      ex.weight = newWeight;
      saveData(DATA);
      renderTraining();
      return;
    }
  }
}

    if (!t) return [];
    localStorage.setItem('fitplan_template', t.name);
    DATA.trainingLog[today] = t.exercises.map(e => ({...e, done: false}));
    saveData(DATA);
  }
  return DATA.trainingLog[today];
}

function renderTraining() {
  const list = document.getElementById('exercise-list');
  const exercises = getTodayTraining();
  const period = DATA.period;
  document.getElementById('period-badge').textContent = period === 'bulk' ? '增肌期' : '减脂期';
  document.getElementById('period-badge').className = 'badge ' + (period === 'bulk' ? 'badge-red' : 'badge-green');
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(period==='bulk'?'增肌':'减脂'));
  });
  
  if (exercises.length === 0) {
    list.innerHTML = '<div class="empty"><p>选择一个训练模板开始，或点击「管理」创建自己的模板</p></div>';
  } else {
    list.innerHTML = exercises.map((ex, i) => `
      <div class="exercise-item ${ex.done ? 'done' : ''}">
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-detail">${ex.sets}组 × ${ex.reps}次 · ${ex.weight}kg</div>
        </div>
        <div class="ex-edit-group">
          <input type="number" value="${ex.weight}" onchange="updateExParam(${i},'weight',this.value)" title="重量kg" style="width:40px;">
          <input type="number" value="${ex.sets}" onchange="updateExParam(${i},'sets',this.value)" title="组数" style="width:30px;">
        </div>
        <div class="ex-check ${ex.done ? 'checked' : ''}" onclick="toggleExercise(${i})">${ex.done ? '✓' : ''}</div>
      </div>
    `).join('');
  }
  const doneCount = exercises.filter(e => e.done).length;
  document.getElementById('stat-today-ex').textContent = `${doneCount}/${exercises.length}`;
  document.getElementById('stat-today-cal').textContent = exercises.length * 65;
  updateAllStats();
  renderSuggestions();
  refreshTemplateSelect();
}

function toggleExercise(i) {
  const ex = DATA.trainingLog[today];
  if (!ex) return;
  ex[i].done = !ex[i].done;
  saveData(DATA);
  renderTraining();
}

function updateExParam(i, field, val) {
  const ex = DATA.trainingLog[today];
  if (!ex) return;
  ex[i][field] = parseInt(val) || ex[i][field];
  saveData(DATA);
}

function loadTemplate() {
  const sel = document.getElementById('template-select');
  if (!sel.value) return;
  localStorage.setItem('fitplan_template', sel.value);
  const all = getAllTemplates();
  const t = all.find(t => t.name === sel.value);
  if (t) {
    DATA.trainingLog[today] = t.exercises.map(e => ({...e, done: false}));
    saveData(DATA);
    renderTraining();
  }
}

function resetToday() {
  delete DATA.trainingLog[today];
  saveData(DATA);
  renderTraining();
}

function finishWorkout() {
  const ex = DATA.trainingLog[today];
  if (!ex || ex.length === 0) return;
  // Update streak
  const yd = new Date(); yd.setDate(yd.getDate()-1);
  const yds = yd.toISOString().slice(0,10);
  if (DATA.lastWorkoutDate === yds) DATA.streak++;
  else if (DATA.lastWorkoutDate !== today) DATA.streak = 1;
  DATA.lastWorkoutDate = today;
  DATA.totalWorkouts = (DATA.totalWorkouts||0) + 1;
  if (DATA.streak > DATA.bestStreak) DATA.bestStreak = DATA.streak;
  saveData(DATA);
  renderTraining();
  const doneCount = ex.filter(e => e.done).length;
  alert('训练完成！' + doneCount + '/' + ex.length + ' 动作 ✓  连续打卡 ' + DATA.streak + ' 天 🔥');
}

function switchPeriod(p) {
  DATA.period = p;
  saveData(DATA);
  renderTraining();
  renderDiet();
}

// ============ TEMPLATE MANAGER ============
function openTemplateManager() {
  renderTemplateList();
  document.getElementById('template-modal').classList.add('show');
  document.getElementById('template-builder-area').style.display = 'none';
}
function closeTemplateManager() {
  document.getElementById('template-modal').classList.remove('show');
  document.getElementById('template-builder-area').style.display = 'none';
  renderTraining();
}

function renderTemplateList() {
  const div = document.getElementById('template-list');
  const userTemplates = getUserTemplates();
  if (userTemplates.length === 0) {
    div.innerHTML = '<div class="empty" style="padding:20px;"><p>还没有自定义模板</p></div>';
  } else {
    div.innerHTML = userTemplates.map((t, i) => `
      <div class="exercise-item" style="justify-content:space-between;">
        <div class="ex-info">
          <div class="ex-name">⭐ ${t.name}</div>
          <div class="ex-detail">${t.exercises.length} 个动作</div>
        </div>
        <div style="display:flex;gap:4px;">
          <button class="btn btn-xs btn-outline" onclick="editTemplate(${i})">✏️</button>
          <button class="btn btn-xs btn-danger" onclick="deleteTemplate(${i})">✕</button>
        </div>
      </div>
    `).join('');
  }
}

function showTemplateBuilder(editIndex) {
  const area = document.getElementById('template-builder-area');
  area.style.display = 'block';
  const parts = ['胸','背','腿','肩','手臂','核心'];
  let selectedExs = [];
  let tplName = '';
  
  if (editIndex !== undefined && editIndex >= 0) {
    const templates = getUserTemplates();
    const t = templates[editIndex];
    tplName = t.name;
    selectedExs = t.exercises.map(e => ({...e}));
  }
  
  area.innerHTML = `
    <hr style="border-color:var(--border);margin:12px 0;">
    <div class="form-group"><label>模板名称</label><input id="tpl-name" value="${tplName}" placeholder="如：我的推胸日"></div>
    <div class="form-group"><label>动作库（点击添加）</label>
      ${parts.map(part => {
        const exs = Object.entries(EXERCISE_LIBRARY).filter(([n,lib]) => lib.part === part);
        return `<div style="margin-bottom:6px;"><span style="font-size:10px;color:var(--text3);">${part}部 </span>
          ${exs.map(([n]) => `<button class="ex-lib-chip" data-ex="${n}" onclick="toggleExInBuilder(this,'${n}')">${n}</button>`).join('')}
        </div>`;
      }).join('')}
    </div>
    <div class="form-group"><label>已选动作</label>
      <div class="selected-exercises" id="builder-selected"></div>
    </div>
    <p class="hint-text">点击上方动作库添加，已选动作可调组数/次数/重量</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" style="flex:1;" onclick="closeTemplateManager()">取消</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveTemplate(${editIndex !== undefined ? editIndex : -1})">💾 保存模板</button>
    </div>
  `;
  
  // Store initial state
  area._selectedExs = selectedExs;
  area._editIndex = editIndex;
  renderBuilderSelected(area);
  
  // Pre-select chips
  for (const ex of selectedExs) {
    const chip = area.querySelector(`[data-ex="${ex.name}"]`);
    if (chip) chip.classList.add('selected');
  }
}

function toggleExInBuilder(chip, exName) {
  const area = document.getElementById('template-builder-area');
  if (!area._selectedExs) area._selectedExs = [];
  const idx = area._selectedExs.findIndex(e => e.name === exName);
  if (idx >= 0) {
    area._selectedExs.splice(idx, 1);
    chip.classList.remove('selected');
  } else {
    const lib = EXERCISE_LIBRARY[exName] || {};
    area._selectedExs.push({ name: exName, sets: lib.defaultSets||4, reps: lib.defaultReps||'8-10', weight: lib.defaultWeight||0 });
    chip.classList.add('selected');
  }
  renderBuilderSelected(area);
}

function renderBuilderSelected(area) {
  const div = area.querySelector('#builder-selected');
  if (!area._selectedExs) area._selectedExs = [];
  if (area._selectedExs.length === 0) {
    div.innerHTML = '<div class="empty" style="padding:10px;"><p>还没选动作</p></div>';
    return;
  }
  div.innerHTML = area._selectedExs.map((e, i) => `
    <div class="selected-ex">
      <span class="se-name">${i+1}. ${e.name}</span>
      <input type="number" value="${e.sets}" onchange="updateBuilderEx(${i},'sets',this.value)" title="组" placeholder="组">
      <input value="${e.reps}" onchange="updateBuilderEx(${i},'reps',this.value)" title="次" placeholder="次" style="width:50px;">
      <input type="number" value="${e.weight}" onchange="updateBuilderEx(${i},'weight',this.value)" title="kg" placeholder="kg">
      <button class="btn btn-xs btn-outline" onclick="removeBuilderEx(${i})" style="color:var(--danger);">✕</button>
    </div>
  `).join('');
}

function updateBuilderEx(i, field, val) {
  const area = document.getElementById('template-builder-area');
  if (!area._selectedExs) return;
  if (field === 'reps') area._selectedExs[i].reps = val;
  else area._selectedExs[i][field] = parseInt(val) || area._selectedExs[i][field];
}

function removeBuilderEx(i) {
  const area = document.getElementById('template-builder-area');
  area._selectedExs.splice(i, 1);
  renderBuilderSelected(area);
}

function saveTemplate(editIndex) {
  const area = document.getElementById('template-builder-area');
  const name = document.getElementById('tpl-name').value.trim();
  if (!name) { alert('请输入模板名称'); return; }
  if (!area._selectedExs || area._selectedExs.length === 0) { alert('请至少选一个动作'); return; }
  
  const templates = getUserTemplates();
  const tpl = { name, exercises: area._selectedExs.map(e => ({...e})) };
  
  if (editIndex >= 0 && editIndex < templates.length) {
    templates[editIndex] = tpl;
  } else {
    templates.push(tpl);
  }
  saveUserTemplates(templates);
  closeTemplateManager();
  renderTemplateList();
  refreshTemplateSelect();
}

function editTemplate(i) {
  showTemplateBuilder(i);
}

function deleteTemplate(i) {
  if (!confirm('确定删除这个模板？')) return;
  const templates = getUserTemplates();
  templates.splice(i, 1);
  saveUserTemplates(templates);
  renderTemplateList();
  refreshTemplateSelect();
}

// ============ DIET ============
function getCafeteriaFoods() {
  const saved = localStorage.getItem('fitplan_cafe_foods');
  return saved ? JSON.parse(saved) : DEFAULT_FOODS;
}

function renderDiet() {
  const macros = calcMacros();
  const todayDiet = DATA.dietLog[today] || [];
  const totalCal = todayDiet.reduce((s,f) => s+f.cal, 0);
  const totalProtein = todayDiet.reduce((s,f) => s+(f.protein||0), 0);
  const totalCarbs = todayDiet.reduce((s,f) => s+(f.carbs||0), 0);
  const totalFat = todayDiet.reduce((s,f) => s+(f.fat||0), 0);
  
  document.getElementById('diet-summary').textContent = `${totalCal} / ${macros.target} kcal`;
  document.getElementById('diet-progress').style.width = Math.min(100, totalCal/macros.target*100) + '%';
  document.getElementById('macro-protein').textContent = `${totalProtein}/${macros.protein}g`;
  document.getElementById('macro-carbs').textContent = `${totalCarbs}/${macros.carbs}g`;
  document.getElementById('macro-fat').textContent = `${totalFat}/${macros.fat}g`;
  document.getElementById('bar-protein').style.width = Math.min(100, totalProtein/macros.protein*100) + '%';
  document.getElementById('bar-carbs').style.width = Math.min(100, totalCarbs/macros.carbs*100) + '%';
  document.getElementById('bar-fat').style.width = Math.min(100, totalFat/macros.fat*100) + '%';
  
  const foods = getCafeteriaFoods();
  document.getElementById('cafeteria-chips').innerHTML = foods.map((f,i) => 
    `<button class="food-chip" onclick="addCafeteriaFood(${i})">${f.name} <span style="font-size:10px;opacity:0.7;">${f.cal}kcal</span></button>`
  ).join('');
  
  const todayDiv = document.getElementById('today-foods');
  if (todayDiet.length === 0) {
    todayDiv.innerHTML = '<div class="empty"><p>还没记录饮食</p></div>';
  } else {
    todayDiv.innerHTML = todayDiet.map((f,i) => `
      <div class="food-item">
        <span class="food-name">${f.name}</span>
        <span class="food-cal">${f.cal} kcal</span>
        <button class="btn btn-sm btn-outline" onclick="removeFood(${i})" style="margin-left:8px;">✕</button>
      </div>
    `).join('');
  }
}

function addCafeteriaFood(i) {
  if (!DATA.dietLog[today]) DATA.dietLog[today] = [];
  DATA.dietLog[today].push({...getCafeteriaFoods()[i]});
  saveData(DATA);
  renderDiet();
}

// ============ FOOD SEARCH ============
function searchFood() {
  const query = document.getElementById('food-name').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('food-search-results');
  if (!query || query.length < 1) { resultsDiv.innerHTML = ''; return; }
  
  const matches = FOOD_DB.filter(f => f.name.toLowerCase().includes(query)).slice(0, 6);
  let html = '';
  if (matches.length > 0) {
    html += '<div class="food-search-dropdown">';
    matches.forEach((f, i) => {
      html += `<div class="food-search-item" onclick="selectFood(${FOOD_DB.indexOf(f)})">
        <span class="fs-name">${f.name}</span>
        <span class="fs-macros">${f.cal}kcal | 蛋${f.protein}g 碳${f.carbs}g 脂${f.fat}g</span>
      </div>`;
    });
    html += '</div>';
  }
  // No local match hint
  if (matches.length === 0) {
    html += '<div style="font-size:11px;color:var(--text3);padding:4px 0;">库中未找到「'+query+'」，手动填写参数，或问 Hermes 帮你查</div>';
  }
  resultsDiv.innerHTML = html;
}

function selectFood(idx) {
  const f = FOOD_DB[idx];
  document.getElementById('food-name').value = f.name;
  document.getElementById('food-cal').value = f.cal;
  document.getElementById('food-protein').value = f.protein;
  document.getElementById('food-carbs').value = f.carbs;
  document.getElementById('food-fat').value = f.fat;
  document.getElementById('food-search-results').innerHTML = '';
}
function addCustomFood() {
  const name = document.getElementById('food-name').value.trim();
  const cal = parseInt(document.getElementById('food-cal').value) || 0;
  const protein = parseInt(document.getElementById('food-protein').value) || 0;
  const carbs = parseInt(document.getElementById('food-carbs').value) || 0;
  const fat = parseInt(document.getElementById('food-fat').value) || 0;
  if (!name || cal <= 0) return;
  if (!DATA.dietLog[today]) DATA.dietLog[today] = [];
  DATA.dietLog[today].push({name, cal, protein, carbs, fat});
  saveData(DATA);
  ['food-name','food-cal','food-protein','food-carbs','food-fat'].forEach(id => document.getElementById(id).value = '');
  renderDiet();
}

function removeFood(i) { DATA.dietLog[today].splice(i,1); if (DATA.dietLog[today].length === 0) delete DATA.dietLog[today]; saveData(DATA); renderDiet(); }
function clearTodayDiet() { delete DATA.dietLog[today]; saveData(DATA); renderDiet(); }

// ============ PROGRESS ============
function renderProgress() { renderWeightChart(); updateAllStats(); }

function renderWeightChart() {
  const chartDiv = document.getElementById('weight-chart');
  const labelsDiv = document.getElementById('weight-labels');
  const entries = Object.entries(DATA.weightLog).sort();
  if (entries.length < 2) {
    chartDiv.innerHTML = '<div class="empty" style="padding:20px;"><p>数据不足，记录体重后生成图表</p></div>';
    labelsDiv.innerHTML = '';
    return;
  }
  const last30 = entries.slice(-30);
  const weights = last30.map(e => e[1].w);
  const maxW = Math.max(...weights), minW = Math.min(...weights);
  const range = maxW - minW || 1;
  chartDiv.innerHTML = last30.map(e => `<div class="chart-bar" style="height:${((e[1].w-minW)/range)*80+20}%;background:${e[1].period==='cut'?'var(--accent2)':'var(--accent)'};" title="${e[0].slice(5)}: ${e[1].w}kg"></div>`).join('');
  labelsDiv.innerHTML = last30.map(e => `<div class="chart-label">${e[0].slice(5)}</div>`).join('');
  document.getElementById('stat-weight-change').textContent = (last30[last30.length-1][1].w - last30[0][1].w).toFixed(1);
}

function recordWeight() {
  const w = parseFloat(document.getElementById('new-weight').value);
  if (!w || w < 30 || w > 300) return;
  if (!DATA.weightLog) DATA.weightLog = {};
  DATA.weightLog[today] = { w, period: DATA.period };
  DATA.weight = w;
  saveData(DATA);
  document.getElementById('new-weight').value = '';
  renderProgress();
}

function showStrengthLog() {
  const exName = document.getElementById('strength-ex-select').value;
  const logDiv = document.getElementById('strength-log');
  if (!exName) { logDiv.innerHTML = '<div class="empty"><p>选择一个动作查看力量变化</p></div>'; return; }
  const entries = [];
  for (const [date, exercises] of Object.entries(DATA.trainingLog)) {
    for (const ex of exercises) {
      if (ex.name === exName && ex.done && ex.weight) entries.push({ date, weight: ex.weight, reps: ex.reps, sets: ex.sets });
    }
  }
  entries.sort((a,b) => b.date.localeCompare(a.date));
  if (entries.length === 0) { logDiv.innerHTML = '<div class="empty"><p>还没有这个动作的记录</p></div>'; return; }
  logDiv.innerHTML = entries.slice(0, 10).map((e, i) => {
    const prev = entries[i+1];
    let arrow = '';
    if (prev) {
      if (e.weight > prev.weight) arrow = ' <span style="color:var(--success)">↑</span>';
      else if (e.weight < prev.weight) arrow = ' <span style="color:var(--danger)">↓</span>';
      else arrow = ' →';
    }
    return `<div class="log-entry"><span class="log-name">${e.date.slice(5)}</span><span class="log-current">${e.weight}kg × ${e.sets}组${arrow}</span><span class="log-prev">${prev ? prev.weight+'kg' : '--'}</span></div>`;
  }).join('');
}

// ============ SETTINGS ============
function openSettings() {
  document.getElementById('set-height').value = DATA.height;
  document.getElementById('set-weight').value = DATA.weight;
  document.getElementById('set-bodyfat').value = DATA.bodyfat;
  document.getElementById('set-age').value = DATA.age;
  document.getElementById('set-period').value = DATA.period;
  document.getElementById('set-frequency').value = DATA.frequency;
  document.getElementById('settings-modal').classList.add('show');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('show'); }
function saveSettings() {
  DATA.height = parseInt(document.getElementById('set-height').value) || 180;
  DATA.weight = parseInt(document.getElementById('set-weight').value) || 70;
  DATA.bodyfat = parseInt(document.getElementById('set-bodyfat').value) || 18;
  DATA.age = parseInt(document.getElementById('set-age').value) || 22;
  DATA.period = document.getElementById('set-period').value;
  DATA.frequency = parseInt(document.getElementById('set-frequency').value) || 4;
  saveData(DATA);
  closeSettings();
  renderTraining();
  renderDiet();
  renderProgress();
  updateAllStats();
}

// ============ STATS ============
function updateAllStats() {
  document.getElementById('stat-streak').textContent = DATA.streak || 0;
  document.getElementById('stat-total-workouts').textContent = DATA.totalWorkouts || 0;
  document.getElementById('stat-best-streak').textContent = DATA.bestStreak || 0;
}

// ============ STARTUP ============
init();
</script>
