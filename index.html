<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FitPlan · 专属健身饮食计划</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card-hover: #1e1e36;
  --accent: #ff6b6b;
  --accent2: #4ecdc4;
  --accent3: #a29bfe;
  --text: #e8e8f0;
  --text2: #b0b0c0;
  --text3: #707088;
  --border: #2a2a40;
  --danger: #ff4757;
  --success: #2ed573;
  --warning: #ffa502;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  max-width: 480px; margin: 0 auto; padding: 0 0 80px; line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}
header {
  padding: 16px 16px 0; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 8px;
}
header h1 { font-size: 20px; font-weight: 800; }
header h1 span { color: var(--accent); }
.btn-icon {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--card); color: var(--text2); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { background: var(--card-hover); }
.tabs { display: flex; gap: 4px; margin: 4px 16px 12px; background: var(--card); border-radius: var(--radius); padding: 3px; }
.tab { flex:1; padding: 10px 0; text-align: center; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text3); border: none; background: transparent; transition: all 0.2s; }
.tab.active { background: var(--accent); color: #fff; }
.page { display: none; padding: 0 16px; }
.page.active { display: block; }

.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-header h3 { font-size: 15px; font-weight: 700; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
.badge-red { background: rgba(255,107,107,0.15); color: var(--accent); }
.badge-green { background: rgba(78,205,196,0.15); color: var(--accent2); }
.badge-purple { background: rgba(162,155,254,0.15); color: var(--accent3); }
.badge-orange { background: rgba(255,165,2,0.15); color: var(--warning); }

.btn { padding: 10px 18px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:active { opacity: 0.8; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-xs { padding: 4px 8px; font-size: 11px; border-radius: 6px; }
.btn-danger { background: var(--danger); color: #fff; }

.stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-box { flex:1; background: var(--card); border-radius: var(--radius); padding: 12px; text-align: center; box-shadow: var(--shadow); }
.stat-box .value { font-size: 22px; font-weight: 800; }
.stat-box .label { font-size: 11px; color: var(--text3); margin-top: 2px; }

.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.progress-red { background: var(--accent); }
.progress-green { background: var(--accent2); }

.exercise-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 6px; transition: all 0.2s; }
.exercise-item.done { opacity: 0.5; }
.exercise-item .ex-info { flex: 1; min-width:0; }
.exercise-item .ex-name { font-size: 14px; font-weight: 600; }
.exercise-item .ex-detail { font-size: 12px; color: var(--text3); margin-top: 2px; }
.ex-check { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-left: 8px; color: transparent; transition: all 0.2s; }
.ex-check.checked { background: var(--accent2); border-color: var(--accent2); color: #fff; font-size: 14px; }
.ex-input { width: 50px; padding: 7px 6px; background: #2e2e46; border: 1px solid #3a3a55; border-radius: 6px; color: #fff; font-size: 13px; text-align: center; margin-left: 6px; }
.ex-edit-group { display: flex; gap: 3px; margin-left: 6px; }
.ex-edit-group input { width: 38px; background: #2e2e46; border: 1px solid #3a3a55; border-radius: 6px; color: #fff; font-size: 13px; text-align: center; padding: 7px 4px; }

.food-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 6px; }
.food-item .food-name { font-size: 14px; font-weight: 500; }
.food-item .food-cal { font-size: 13px; color: var(--accent2); font-weight: 600; }
.food-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.food-chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; background: var(--border); color: var(--text2); border: none; transition: all 0.15s; user-select: none; }
.food-chip:active, .food-chip.selected { background: var(--accent2); color: var(--bg); }

.macro-row { display: flex; gap: 8px; margin-top: 8px; }
.macro-item { flex: 1; }
.macro-item .macro-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; display: flex; justify-content: space-between; }
.macro-item .macro-val { font-size: 11px; color: var(--text2); }

.chart-container { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.chart-container h3 { font-size: 14px; margin-bottom: 12px; }
.chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 120px; justify-content: center; }
.chart-bar { flex:1; max-width: 16px; border-radius: 3px 3px 0 0; transition: height 0.3s; cursor: pointer; }
.chart-labels { display: flex; gap: 3px; justify-content: center; margin-top: 6px; }
.chart-label { flex:1; max-width: 16px; font-size: 8px; color: var(--text3); text-align: center; }

.modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
.modal h3 { font-size: 16px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 10px 12px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
.form-row { display: flex; gap: 8px; }
.form-row .form-group { flex: 1; }

.strength-log { font-size: 13px; }
.strength-log .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.log-name { font-weight: 500; flex: 2; font-size: 13px; }
.log-current { color: var(--accent2); flex: 2; text-align: center; font-size: 13px; }
.log-prev { color: var(--text3); flex: 2; text-align: right; font-size: 12px; }

.empty { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

.period-selector { display: inline-flex; background: var(--border); border-radius: 8px; padding: 2px; }
.period-btn { padding: 6px 14px; border-radius: 7px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text3); transition: all 0.2s; }
.period-btn.active { background: var(--accent); color: #fff; }
.weight-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.weight-row input { flex:1; padding: 8px 12px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; }
.weight-row input:focus { outline: none; border-color: var(--accent); }

/* Smart suggestion */
.suggestion-card {
  background: linear-gradient(135deg, rgba(162,155,254,0.1), rgba(255,107,107,0.1));
  border: 1px solid var(--accent3); border-radius: var(--radius); padding: 14px;
  margin-bottom: 12px;
}
.suggestion-card .sug-title { font-size: 13px; font-weight: 700; color: var(--accent3); margin-bottom: 8px; }
.suggestion-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item .sug-icon { font-size: 16px; flex-shrink: 0; }

/* Template builder */
.template-builder { margin-top: 12px; }
.exercise-library { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.ex-lib-chip { padding: 4px 10px; border-radius: 14px; font-size: 12px; cursor: pointer; background: var(--border); color: var(--text2); border: none; transition: all 0.15s; }
.ex-lib-chip:active, .ex-lib-chip.selected { background: var(--accent); color: #fff; }
.selected-exercises { margin-bottom: 10px; }
.selected-ex {
  display: flex; align-items: center; gap: 6px; padding: 8px; background: rgba(255,255,255,0.03);
  border-radius: 8px; margin-bottom: 4px; font-size: 12px;
.selected-ex { display: flex; align-items: center; gap: 6px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 4px; font-size: 13px; }
.selected-ex .se-name { flex: 2; font-weight: 600; min-width: 60px; }
.selected-ex input { width: 40px; padding: 3px 4px; background: var(--border); border: none; border-radius: 4px; color: var(--text); font-size: 12px; text-align: center; }
.hint-text { font-size: 12px; color: var(--text3); margin-top: 4px; }
.form-group label { font-size: 13px; }
.suggestion-card .sug-title { font-size: 14px; }
.chart-container h3 { font-size: 15px; }
.chart-label { font-size: 9px; }

/* Food search */
.food-search-dropdown { background: var(--border); border-radius: 8px; max-height: 180px; overflow-y: auto; margin-top: 4px; }
.food-search-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; cursor: pointer; font-size: 13px; transition: background 0.15s;
}
.food-search-item:hover, .food-search-item:active { background: rgba(255,255,255,0.06); }
.food-search-item .fs-name { flex:1; }
.food-search-item .fs-macros { font-size: 11px; color: var(--text3); margin-left: 8px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ===== AUTH PAGE ===== -->
<div id="auth-page" style="display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;">
  <div class="card" style="width:100%; max-width:360px;">
    <div style="display:flex; gap:0; margin-bottom:20px; background:var(--border); border-radius:10px; padding:3px;">
      <button class="tab active" onclick="switchAuthTab('login')" id="auth-tab-login">登录</button>
      <button class="tab" onclick="switchAuthTab('register')" id="auth-tab-register">注册</button>
    </div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group"><input id="login-email" type="email" placeholder="邮箱" required></div>
      <div class="form-group"><input id="login-password" type="password" placeholder="密码" required minlength="6"></div>
      <p id="login-error" style="color:var(--danger);font-size:12px;display:none;margin-bottom:8px;"></p>
      <button class="btn btn-primary btn-block" type="submit">登录</button>
      <p style="text-align:center;margin-top:12px;font-size:12px;color:var(--text3);"><a href="#" onclick="handleForgotPassword(event)" style="color:var(--accent3);">忘记密码？</a></p>
    </form>
    <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
      <div class="form-group"><input id="reg-email" type="email" placeholder="邮箱" required></div>
      <div class="form-group"><input id="reg-password" type="password" placeholder="密码（至少6位）" required minlength="6"></div>
      <div class="form-group"><input id="reg-password2" type="password" placeholder="确认密码" required minlength="6"></div>
      <p id="reg-error" style="color:var(--danger);font-size:12px;display:none;margin-bottom:8px;"></p>
      <button class="btn btn-primary btn-block" type="submit">注册</button>
    </form>
  </div>
</div>

<header style="display:none;">
  <h1>Fit<span>Plan</span></h1>
  <div style="display:flex; gap:8px; align-items:center;">
    <div id="user-avatar" onclick="toggleUserMenu()" style="width:32px;height:32px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;"></div>
    <button class="btn-icon" onclick="openSettings()" title="设置">⚙</button>
  </div>
</header>

<div id="user-dropdown" style="display:none; position:fixed; top:52px; right:calc(50% - 224px); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px; z-index:50; min-width:150px; box-shadow:0 4px 20px rgba(0,0,0,0.4);">
  <div style="padding:8px 12px; font-size:12px; color:var(--text3);" id="user-email-display"></div>
  <button class="btn btn-sm btn-outline btn-block" onclick="handleLogout()" style="margin-top:4px;">退出登录</button>
</div>

<div class="tabs" style="display:none;">
  <button class="tab active" onclick="switchTab('training')">🏋️ 训练</button>
  <button class="tab" onclick="switchTab('diet')">🍽 饮食</button>
  <button class="tab" onclick="switchTab('progress')">📊 进度</button>
</div>

<!-- ===== TRAINING PAGE ===== -->
<div class="page" id="page-training">
  <div class="stats-row">
    <div class="stat-box"><div class="value" id="stat-streak">0</div><div class="label">本月健身次数</div></div>
    <div class="stat-box"><div class="value" id="stat-today-ex">0</div><div class="label">今日动作</div></div>
    <div class="stat-box"><div class="value" id="stat-today-cal">0</div><div class="label">预估消耗</div></div>
  </div>

  <!-- Smart Suggestions -->
  <div class="suggestion-card" id="suggestion-panel" style="display:none;"></div>

  <div class="card">
    <div class="card-header">
      <h3>今日训练</h3>
      <span class="badge badge-red" id="period-badge">增肌期</span>
    </div>
    <div class="period-selector" style="margin-bottom:12px;">
      <button class="period-btn active" onclick="switchPeriod('bulk')">增肌期</button>
      <button class="period-btn" onclick="switchPeriod('cut')">减脂期</button>
    </div>
    <div id="exercise-list"></div>
    <div style="display:flex; gap:6px; margin-top:8px;">
      <select id="template-select" style="flex:1; padding:8px; background:var(--border); border:none; border-radius:8px; color:var(--text); font-size:12px;" onchange="loadTemplate()">
        <option value="">选择训练模板...</option>
      </select>
      <button class="btn btn-sm btn-outline" onclick="openTemplateManager()">⚙ 管理</button>
    </div>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <button class="btn btn-secondary btn-sm" onclick="resetToday()" style="flex:1;">重置今日</button>
      <button class="btn btn-primary btn-sm" onclick="finishWorkout()" style="flex:1;">✅ 完成训练</button>
    </div>
  </div>
</div>

<!-- ===== DIET PAGE ===== -->
<div class="page" id="page-diet">
  <div class="card" style="margin-bottom:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <span style="font-size:13px; font-weight:600;">🍽 今日饮食</span>
      <span style="font-size:13px;" id="diet-summary">0 / 0 kcal</span>
    </div>
    <div class="progress-bar" style="margin-bottom:10px;"><div class="progress-fill progress-green" id="diet-progress" style="width:0%"></div></div>
    <div class="macro-row">
      <div class="macro-item">
        <div class="macro-label"><span>🥩 蛋白质</span><span class="macro-val" id="macro-protein">0/0g</span></div>
        <div class="progress-bar"><div class="progress-fill progress-red" id="bar-protein" style="width:0%"></div></div>
      </div>
      <div class="macro-item">
        <div class="macro-label"><span>🍚 碳水</span><span class="macro-val" id="macro-carbs">0/0g</span></div>
        <div class="progress-bar"><div class="progress-fill" style="background:#ffa502;" id="bar-carbs" style="width:0%"></div></div>
      </div>
      <div class="macro-item">
        <div class="macro-label"><span>🥑 脂肪</span><span class="macro-val" id="macro-fat">0/0g</span></div>
        <div class="progress-bar"><div class="progress-fill progress-green" id="bar-fat" style="width:0%"></div></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h3>🏫 食堂菜品</h3></div>
    <div class="food-chips" id="cafeteria-chips"></div>
    <div style="font-size:11px; color:var(--text3); margin-top:6px;">点击菜品添加到今日饮食</div>
  </div>
  <div class="card">
    <div class="card-header"><h3>✏️ 自由添加</h3></div>
    <div class="form-row">
      <div class="form-group"><label>食物名称</label><input id="food-name" placeholder="输入名称自动搜索..." oninput="searchFood()" autocomplete="off"></div>
      <div class="form-group"><label>热量 (kcal)</label><input id="food-cal" type="number" placeholder="自动填充"></div>
    </div>
    <div id="food-search-results" style="margin-bottom:8px;"></div>
    <div class="form-row">
      <div class="form-group"><label>蛋白质 (g)</label><input id="food-protein" type="number" placeholder="自动填充"></div>
      <div class="form-group"><label>碳水 (g)</label><input id="food-carbs" type="number" placeholder="自动填充"></div>
      <div class="form-group"><label>脂肪 (g)</label><input id="food-fat" type="number" placeholder="自动填充"></div>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="addCustomFood()">+ 添加</button>
  </div>
  <div class="card">
    <div class="card-header"><h3>📋 今日记录</h3><button class="btn btn-sm btn-outline" onclick="clearTodayDiet()">清空</button></div>
    <div id="today-foods"><div class="empty"><p>还没记录饮食</p></div></div>
  </div>
</div>

<!-- ===== PROGRESS PAGE ===== -->
<div class="page" id="page-progress">
  <div class="chart-container">
    <h3>⚖️ 体重趋势 (30天)</h3>
    <div class="chart-bars" id="weight-chart"></div>
    <div class="chart-labels" id="weight-labels"></div>
    <div style="margin-top:10px; display:flex; gap:8px;">
      <div style="display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text3);"><span style="width:10px;height:10px;background:var(--accent);border-radius:2px;"></span> 增肌期</div>
      <div style="display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text3);"><span style="width:10px;height:10px;background:var(--accent2);border-radius:2px;"></span> 减脂期</div>
    </div>
    <div class="weight-row">
      <input id="new-weight" type="number" step="0.1" placeholder="输入今日体重 (kg)">
      <button class="btn btn-primary btn-sm" onclick="recordWeight()">记录</button>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <h3>💪 力量追踪</h3>
      <select id="strength-ex-select" style="padding:6px 10px; background:var(--border); border:none; border-radius:8px; color:var(--text); font-size:12px;" onchange="showStrengthLog()">
        <option value="">选择动作...</option>
      </select>
    </div>
    <div class="strength-log" id="strength-log"><div class="empty"><p>选择一个动作查看力量变化</p></div></div>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="value" id="stat-total-workouts">0</div><div class="label">总训练次数</div></div>
    <div class="stat-box"><div class="value" id="stat-best-streak">0</div><div class="label">最长连续</div></div>
    <div class="stat-box"><div class="value" id="stat-weight-change">0</div><div class="label">30天变化(kg)</div></div>
  </div>
</div>

<!-- ===== SETTINGS MODAL ===== -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>⚙ 个人数据</h3>
    <div class="form-row">
      <div class="form-group"><label>身高 (cm)</label><input id="set-height" type="number" value="180"></div>
      <div class="form-group"><label>体重 (kg)</label><input id="set-weight" type="number" value="70"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>体脂率 (%)</label><input id="set-bodyfat" type="number" value="18"></div>
      <div class="form-group"><label>年龄</label><input id="set-age" type="number" value="22"></div>
    </div>
    <div class="form-group"><label>当前阶段</label><select id="set-period"><option value="bulk">增肌期</option><option value="cut">减脂期</option></select></div>
    <div class="form-group"><label>训练频率</label><select id="set-frequency"><option value="3">每周3天</option><option value="4">每周4天</option><option value="5">每周5天</option><option value="6">每周6天</option></select></div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-secondary" style="flex:1;" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- ===== TEMPLATE MANAGER MODAL ===== -->
<div class="modal-overlay" id="template-modal">
  <div class="modal">
    <h3>⚙ 训练模板管理</h3>
    <div id="template-list" style="max-height:200px;overflow-y:auto;margin-bottom:12px;"></div>
    <button class="btn btn-primary btn-block" onclick="showTemplateBuilder()">+ 新建模板</button>
    <button class="btn btn-secondary btn-block" style="margin-top:6px;" onclick="closeTemplateManager()">关闭</button>
    <div id="template-builder-area" style="display:none;"></div>
  </div>
</div>

<script src="fitplan.js"></script>
</body>
</html>
